include kitty-theme.conf

mouse_map left click ungrabbed mouse_handle_click prompt
mouse_map ctrl+left click ungrabbed mouse_handle_click link

scrollback_lines 1000000

scrollback_pager env LESSUTFBINFMT=*n%C less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

window_padding_width 0

font_size 10

map kitty_mod+t new_tab_with_cwd
map kitty_mod+enter new_window_with_cwd
map kitty_mod+n new_os_window_with_cwd

map cmd+c copy_or_interrupt

map cmd+k  clear_terminal to_cursor_scroll active
map cmd+shift+k combine : clear_terminal scroll active : clear_terminal scrollback active